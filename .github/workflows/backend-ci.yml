
name: CI - Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2', '8.3']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: clubmanager_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, json, sqlite3, mysql, pdo_mysql
          coverage: xdebug
          tools: composer:v2
      - name: Copy .env
        run: |
          cd backend
          cp .env.example .env
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=clubmanager_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=password/' .env
      - name: Install Dependencies
        run: |
          cd backend
          composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader
      - name: Generate Application Key
        run: |
          cd backend
          php artisan key:generate
      - name: Run Migrations
        run: |
          cd backend
          php artisan migrate --force
      - name: Run Tests
        run: |
          cd backend
          php artisan test --coverage --min=80
      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v3
        if: matrix.php-version == '8.3'
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
      - name: Run PHPStan
        run: |
          cd backend
          vendor/bin/phpstan analyse --memory-limit=2G || true
      - name: Check Code Style
        run: |
          cd backend
          vendor/bin/pint --test || true
